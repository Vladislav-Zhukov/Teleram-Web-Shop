services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/media

  bot:
    build: ./bot
    env_file: .env
    depends_on:
      - backend

  web:
    build: ./web
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_BOT_USERNAME=${VITE_BOT_USERNAME}
    depends_on:
      - backend
    ports:
      - "5173:5173"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
